<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Transit — Транспорт Чернівців</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
        <div id="sidebar-header">
            <h1>🚌 CV Transit</h1>
            <span id="connection-badge" class="badge badge--connecting">з'єднання...</span>
        </div>

        <div id="stats-bar">
            <div class="stat">
                <span class="stat__value" id="stat-vehicles">—</span>
                <span class="stat__label">транспорт онлайн</span>
            </div>
            <div class="stat">
                <span class="stat__value" id="stat-routes">—</span>
                <span class="stat__label">маршрутів</span>
            </div>
        </div>

        <div id="route-filter">
            <input type="text" id="route-search" placeholder="Пошук маршруту..."/>
            <div id="route-list">
                <!-- заповнюється динамічно -->
            </div>
        </div>

        <div id="sidebar-footer">
            <span id="last-update">Очікування оновлення...</span>
        </div>
    </aside>

    <!-- ── Map ── -->
    <main id="map"></main>

    <!-- ── Vehicle popup (detail panel) ── -->
    <div id="vehicle-panel" class="vehicle-panel vehicle-panel--hidden">
        <button id="vehicle-panel-close">✕</button>
        <div id="vehicle-panel-content"></div>
    </div>

    <!-- Nearby panel -->
    <div id="nearby-panel" style="display:none">
        <div id="nearby-panel-header">
            <span>📍 Маршрути поблизу <span id="nearby-radius-label">(300 м)</span></span>
            <button id="nearby-close-btn" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">✕</button>
        </div>
        <div id="nearby-panel-body">
            <div class="nearby-empty">Перетягніть маркер для пошуку</div>
        </div>
    </div>

    <!-- Geo button -->
    <button class="geo-btn" id="geo-btn" title="Пошук маршрутів поблизу">📍</button>

    <!-- Route planner -->
    <div id="planner-panel">
        <div id="planner-header">
            <span>🗺 Планувальник маршруту</span>
            <button id="planner-close" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">✕</button>
        </div>
        <div id="planner-inputs">
            <div class="planner-input-row">
                <div class="planner-dot" style="background:#34a853"></div>
                <input class="planner-input" id="planner-from" placeholder="Звідки..." readonly/>
                <button class="planner-pin-btn" id="pin-from-btn" title="Вказати на карті">📍</button>
            </div>
            <div class="planner-input-row">
                <div class="planner-dot" style="background:#ea4335"></div>
                <input class="planner-input" id="planner-to" placeholder="Куди..." readonly/>
                <button class="planner-pin-btn" id="pin-to-btn" title="Вказати на карті">📍</button>
            </div>
            <button id="planner-search-btn" disabled>Знайти маршрут</button>
        </div>
        <div id="planner-results"></div>
    </div>

    <button class="planner-btn" id="planner-btn" title="Планувальник маршруту">🗺</button>

</div>

<script th:src="@{/js/map.js}"></script>
</body>
</html>
