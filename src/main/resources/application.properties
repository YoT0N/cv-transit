spring.application.name=cv-transit
spring.docker.compose.enabled=false

# ?? PostgreSQL ??????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/transit?TimeZone=Europe/Kyiv
spring.datasource.username=transit
spring.datasource.password=transit
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ?????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? Flyway ??????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ?? Redis ???????????????????????????????????????????????????
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ?? Redis Cache ??????????????????????????????????????????????????????????????
spring.cache.type=redis
spring.data.redis.timeout=2000ms
# ???? Redis ??????????? ? ?? ???????, ?????? ???????
spring.cache.redis.enable-statistics=true

# ?? Actuator (??????????) ???????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ?? Scheduler ???????????????????????????????????????????????
spring.task.scheduling.pool.size=4

# ?? Nimbus MQTT (Flespi broker) ?????????????????????????????????????????????
# WebSocket URI ???????. wss:// = TLS (???????? ??? ??????????)
nimbus.mqtt.broker-uri=wss://mqtt.flespi.io/mqtt
# ????????? ????? ???????? Nimbus (? URL ????????)
nimbus.mqtt.token=756022170f424d008f931dfb6912dff7
# QoS 0 = at-most-once (GPS ?? ???????? ?? ??????????)
nimbus.mqtt.qos=0

# ?? Logging ?????????????????????????????????????????????????
logging.level.edu.ilkiv.transit=DEBUG
logging.level.org.springframework.web=INFO
logging.level.reactor.netty.http.client=WARN
logging.level.com.zaxxer.hikari=WARN

transportcv.collector.enabled=true
nimbus.mqtt.enabled=false
easyway.collector.enabled=true

